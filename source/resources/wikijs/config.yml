# Wiki.js 配置文件
# 详细配置说明: https://docs.requarks.io/setup/configuration

# 数据库配置
db:
  type: postgres
  host: postgres
  port: 5432
  user: wikijs
  pass: wikijs_password
  db: wikijs
  ssl: false

# 站点配置
site:
  title: My Wiki
  host: localhost
  port: 3000
  path: /

# 日志级别
logLevel: info

# Git 存储配置
git:
  enabled: true
  path: /wiki/data/repo
  url: https://github.com/YOUR_USERNAME/YOUR_REPO.git
  branch: main
  auth:
    type: ssh
    privateKey: /wiki/data/git/id_rsa
    username: git
  verifySSL: true
  defaultEmail: wiki@example.com
  defaultName: Wiki
  syncInterval: 5

# 存储类型
storage:
  target: git

# 文件上传配置
uploads:
  maxFileSize: 5242880
  maxFiles: 10
  imagePreview: true

# 渲染引擎
rendering:
  dirWatch: true
  lineBreaks: true

# 安全配置
security:
  uploadMaxFiles: 10
  uploadMaxFileSize: 5242880
  openRedirect: false

# 性能配置
perf:
  dbPoolMin: 2
  dbPoolMax: 10

# SSL 配置（可选）
ssl:
  enabled: false
  provider: letsencrypt
  domain: localhost
