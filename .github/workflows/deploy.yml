name: pages-build-deployment

on:
  push:
    branches: [ master ]
  workflow_dispatch:

# 设置 GitHub Pages 权限
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd blog
          npm install
          echo "=== Installed packages ==="
          npm list --depth=0

      - name: Generate static files
        run: |
          cd blog
          echo "=== Hexo version ==="
          npx hexo version
          echo "=== Cleaning ==="
          npx hexo clean
          echo "=== Generating ==="
          npx hexo generate
          echo "✅ Generation completed"

      - name: Verify build output
        run: |
          cd blog
          echo "=== Checking public directory ==="
          ls -la public/ || (echo "❌ public directory not found!" && exit 1)
          echo "=== Checking index.html ==="
          ls -la public/index.html public/index/index.html 2>/dev/null || echo "Checking for index files..."
          FILE_COUNT=$(find public -type f | wc -l)
          echo "📊 Total files generated: $FILE_COUNT"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./blog/public
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Hexo blog - ${{ github.event.head_commit.message }}'
