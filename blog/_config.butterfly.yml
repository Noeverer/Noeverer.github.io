# Hexo Theme Butterfly Configuration
# Docs: https://butterfly.js.org/posts/21cfbf15/

# 网站信息
site_name: 'Ante Liu'
site_author: 'Ante Liu'
site_description: '全栈开发工程师 | 技术探索者 | 终身学习者'
site_keywords: '编程,技术,前端,后端,全栈,AI,Python,JavaScript'

# 导航栏
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  技术 || fas fa-code:
    - 编程 || /tags/code/ || fas fa-code
    - Python || /tags/python/ || fab fa-python
    - AI || /tags/ai/ || fas fa-robot
    - 工具 || /tags/tools/ || fas fa-tools
  学习 || fas fa-book:
    - 学习笔记 || /tags/study/ || fas fa-book
    - 思维导图 || /tags/mindmap/ || fas fa-sitemap
  生活 || fas fa-heart:
    - 感悟 || /tags/感悟/ || fas fa-heart
    - 随笔 || /tags/notes/ || fas fa-pen
  关于: /about/ || fas fa-address-card

# 搜索
local_search:
  enable: true
  preload: false

# 代码高亮
highlight_theme: mac light

# 社交图标
social:
  fab fa-github: https://github.com/Noeverer || Github
  fas fa-envelope: mailto:robotliu0327@gmail.com || Email
  fab fa-twitter: https://twitter.com/your_username || Twitter

# 主题色
theme_color:
  enable: true
  main: '#49B1F5'
  paginator: '#FF6B6B'
  button_hover: '#4ECDC4'
  text_selection: '#FF6B6B'
  link_color: '#49B1F5'
  hr_color: '#F7B731'

# 字体
font:
  font-size: 15px
  font-family: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji"'

# 图片
avatar:
  img: https://source.unsplash.com/random/200x200/?portrait
  effect: false

# 顶部图
disable_top_img: false
default_top_img: /img/index_top_img.jpg
index_img: /img/index_top_img.jpg
index_site_info_top: null

# 文章元数据
post_meta:
  page:
    date_type: both
    date_format: 'YYYY-MM-DD HH:mm:ss'
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: 'YYYY-MM-DD HH:mm:ss'
    categories: true
    tags: true
    label: true

# 文章封面
cover_index_enable: true
cover_archive_enable: false
cover_tag_enable: false
cover_category_enable: false
random_cover: false

# 分页
pagination_style: 3

# 侧边栏
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_webinfo:
      enable: true
      post_count: true
      runtime: true
  card_author:
    enable: true
    description: '👨‍💻 全栈开发者 | 🚀 技术探索者 | 📚 终身学习者'
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/Noeverer
  card_announcement:
    enable: true
    content: '🎉 欢迎访问我的技术博客，分享编程经验与技术感悟'
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order: -1
  card_categories:
    enable: true
    limit: 10
    expand: none
    sort_order: -1
  card_tags:
    enable: true
    limit: 20
    orderby: random
    order: count
    transition: true
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 10
    sort: date

# 页脚
footer:
  owner:
    enable: true
    since: 2015
  custom_text: '📧 robotliu0327@gmail.com | 🌟 Powered by Hexo & Butterfly'
  copyright: true

# 404页面
error_404:
  enable: true
  subtitle: '页面不存在'
  background: 'https://cdn.jsdelivr.net/gh/jerryc127/butterfly_theme_source/img/404.jpg'

# 运行时间
runtimeshow:
  enable: true
  publish_date: '01/01/2015 00:00:00'
  unit: '天'

# 侧边栏设置
toc:
  enable: true
  number: true
  expand_all: false
  init_open: true
  layout: right

# 评论（默认关闭）
comments:
  use: false
  text: '欢迎留言交流'

# PWA（离线访问）
pwa:
  enable: false

# 性能优化
preload:
  enable: true
  service:
    fas: https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@latest/css/all.min.css

# 优化
lazyload:
  enable: true
  field: site
  placeholder: /img/loading.gif
  errorimg: /img/error.gif

# 图片懒加载
fancybox: true

# Mermaid图表
mermaid:
  enable: false
  theme: default

# MathJax数学公式
mathjax:
  enable: false

# KaTeX数学公式
katex:
  enable: false

# Aplayer音乐播放器
aplayerInject:
  enable: false

# 自定义JS/CSS暂时禁用
inject:
  head: []
  bottom: []

# 友情链接
link: false

# 夜间模式
display_mode:
  light:
    enable: true
    icon: 'fa fa-sun'
    theme: 'light'
  dark:
    enable: true
    icon: 'fa fa-moon'
    theme: 'dark'
  auto:
    enable: true
    icon: 'fa fa-adjust'

# 打印
print_enable: false

# 版权声明
post_copyright:
  enable: true
  decode: true
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/